<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="flowr logo option B — abstracted geometric, blue circle seed">
  <!--
    Option B: Abstracted Geometric
    Blue filled circle as the "seed" (initial state).
    Three curved paths branch to open circles (end states).
    The grain metaphor is implicit — reads as a state diagram first.
  -->

  <!-- Seed / initial state — filled blue -->
  <circle cx="50" cy="18" r="9" fill="#3b82f6" stroke="#0f172a" stroke-width="2"/>

  <!-- Transition point -->
  <circle cx="50" cy="38" r="2.5" fill="#0f172a"/>

  <!-- Left path -->
  <path d="M50,41 C47,50 28,56 20,68"
        fill="none" stroke="#0f172a" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="18" cy="74" r="5" fill="none" stroke="#0f172a" stroke-width="2"/>

  <!-- Center path -->
  <path d="M50,41 C50,50 50,56 50,68"
        fill="none" stroke="#0f172a" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="50" cy="76" r="5" fill="none" stroke="#0f172a" stroke-width="2"/>

  <!-- Right path -->
  <path d="M50,41 C53,50 72,56 80,68"
        fill="none" stroke="#0f172a" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="82" cy="74" r="5" fill="none" stroke="#0f172a" stroke-width="2"/>
</svg>
