<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="flowr logo — grain transforms into branching paths, flour to flow">
  <!--
    flowr logo: Grain-to-Graph concept.
    A single wheat grain at top (organic, rounded) transforms
    into 3 branching paths below (geometric, directional).
    The grain IS the graph — the raw material becomes structure.

    Colors:
      dark-bran    #3d2b1f   paths, grain outline, seed line
      crust-gold   #c49a3c   grain fill, transition dot
      malt-green   #6b8f71   (reserved — secondary accent)
  -->

  <!-- Wheat grain — organic, rounded, solid -->
  <ellipse cx="50" cy="22" rx="8" ry="14"
           fill="#c49a3c" stroke="#3d2b1f" stroke-width="2.5"/>
  <!-- Seed line down the middle of the grain -->
  <line x1="50" y1="10" x2="50" y2="34"
        stroke="#3d2b1f" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Whisker at grain tip -->
  <line x1="50" y1="8" x2="50" y2="4"
        stroke="#3d2b1f" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Transition point — where grain meets graph -->
  <circle cx="50" cy="40" r="3" fill="#3d2b1f"/>

  <!-- Left path — state transition -->
  <path d="M50,43 C48,52 30,58 22,70"
        fill="none" stroke="#3d2b1f" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Left end state -->
  <circle cx="20" cy="74" r="5" fill="none" stroke="#3d2b1f" stroke-width="2.2"/>

  <!-- Center path — state transition -->
  <path d="M50,43 C50,52 50,58 50,70"
        fill="none" stroke="#3d2b1f" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Center end state -->
  <circle cx="50" cy="76" r="5" fill="none" stroke="#3d2b1f" stroke-width="2.2"/>

  <!-- Right path — state transition -->
  <path d="M50,43 C52,52 70,58 78,70"
        fill="none" stroke="#3d2b1f" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Right end state -->
  <circle cx="80" cy="74" r="5" fill="none" stroke="#3d2b1f" stroke-width="2.2"/>
</svg>